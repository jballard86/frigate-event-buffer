# Intel Arc / GPU_VENDOR=intel — copy to docker-compose.yml or merge patterns into yours.
# Requires: Dockerfile.intel build; host passes DRI render node (adjust renderD128 if needed).
# On the host: `getent group video render` — use group_add names or numeric GIDs if names missing.
# One-off hardware smoke (Phase 8): ./scripts/run_intel_arc_docker_smoke.sh --strict --vainfo
#
# docker compose -f docker-compose.intel.example.yml up -d --build

services:
  frigate_buffer:
    container_name: frigate_buffer_intel
    build:
      context: .
      dockerfile: Dockerfile.intel
      args:
        USE_GUI_OPENCV: "false"
        # Set to "1" only after checking IPEX + torch compatibility for your Arc stack.
        INSTALL_IPEX: "0"
    image: frigate-buffer:intel
    restart: unless-stopped
    network_mode: bridge
    shm_size: 1gb
    ports:
      - "5055:5055"
    env_file:
      - .env
    environment:
      DOCKER_ENV: "true"
      LOG_LEVEL: INFO
      GPU_VENDOR: intel
    volumes:
      - ./storage:/app/storage
      - ./config.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - video
      - render

networks: {}
